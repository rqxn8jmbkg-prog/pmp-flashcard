<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMP Flashcards 🚀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PMP Flashcards 🚀</h1>
        
        <div class="stats">
            Đang lưu: <span id="total-count">0</span> thuật ngữ
        </div>

        <div class="flashcard-container">
            <div class="flashcard" id="card">
                <div class="front"><p id="word-front">Đang tải...</p></div>
                <div class="back"><p id="meaning-back">...</p></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-next" onclick="nextCard()">Tiếp theo ➡️</button>
            <button class="btn-clear" onclick="clearCurrentWord()">Đã thuộc ✅</button>
        </div>

        <div class="divider"></div>

        <div class="input-section">
            <h3>Thêm thuật ngữ PMP</h3>
            <input type="text" id="new-word" placeholder="Ví dụ: Critical Path..." onblur="autoTranslate()">
            <div id="loading" style="display:none; font-size: 12px; color: #007bff;">🤖 Đang tra từ điển PMP...</div>
            <input type="text" id="new-meaning" placeholder="Nghĩa chuẩn PMP">
            <button class="btn-add" onclick="addWord()">Lưu vào bộ nhớ</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
